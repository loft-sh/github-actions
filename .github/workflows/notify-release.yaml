name: Notify release

on:
  workflow_call:
    inputs:
      release_version:
        description: 'The release version tag (e.g. v1.2.3)'
        required: true
        type: string
      previous_tag:
        description: 'The previous tag for changelog comparison (required when status=success)'
        required: false
        type: string
        default: ''
      target_repo:
        description: 'Target repository (e.g. loft-sh/vcluster)'
        required: true
        type: string
      product:
        description: 'Product name (e.g. vCluster, vCluster Platform)'
        required: true
        type: string
      status:
        description: 'Release status: success, failure, cancelled, or skipped (default: success)'
        required: false
        type: string
        default: 'success'
      ref:
        description: 'The git ref to checkout (defaults to github.ref)'
        required: false
        type: string
        default: ''
      dry-run:
        description: 'Validate inputs and workflow structure without sending notifications'
        required: false
        type: boolean
        default: false
    secrets:
      SLACK_WEBHOOK_URL_PRODUCT_RELEASES:
        description: 'Slack incoming webhook URL for #product-releases'
        required: true

permissions:
  contents: read

jobs:
  notify_release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required inputs are non-empty (dry-run)
        if: inputs.dry-run
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
          PREVIOUS_TAG: ${{ inputs.previous_tag }}
          TARGET_REPO: ${{ inputs.target_repo }}
          PRODUCT: ${{ inputs.product }}
          STATUS: ${{ inputs.status }}
        run: |
          echo "dry-run: validating notify-release inputs"
          echo "  release_version=$RELEASE_VERSION"
          echo "  previous_tag=$PREVIOUS_TAG"
          echo "  target_repo=$TARGET_REPO"
          echo "  product=$PRODUCT"
          echo "  status=$STATUS"
          REQUIRED_VARS="RELEASE_VERSION TARGET_REPO PRODUCT"
          if [ "$STATUS" = "success" ]; then
            REQUIRED_VARS="$REQUIRED_VARS PREVIOUS_TAG"
          fi
          for var in $REQUIRED_VARS; do
            if [ -z "${!var}" ]; then
              echo "::error::Required input $var is empty"
              exit 1
            fi
          done
          echo "All required inputs are valid"
      - name: Checkout repository
        if: ${{ !inputs.dry-run && inputs.status == 'success' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.target_repo }}
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - name: Notify #product-releases Slack channel
        if: ${{ !inputs.dry-run }}
        uses: loft-sh/github-actions/.github/actions/release-notification@4207288daf055fa396f57e248dd3c5657c32c65b # release-notification/v1
        with:
          version: ${{ inputs.release_version }}
          previous_tag: ${{ inputs.previous_tag }}
          changes: "See changelog link below"
          target_repo: ${{ inputs.target_repo }}
          product: ${{ inputs.product }}
          status: ${{ inputs.status }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL_PRODUCT_RELEASES }} # zizmor: ignore[secrets-outside-env] -- webhook URL passed via workflow_call
