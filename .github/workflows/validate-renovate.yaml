name: Validate Renovate Config

on:
  workflow_call:

jobs:
  validate:
    name: Validate Renovate configuration
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false

      - name: Get changed Renovate config files
        id: changed-files
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            renovate:
              - 'renovate.json'
              - 'renovate.json5'
              - '.renovaterc'
              - '.renovaterc.json'
              - '.github/renovate.json'
              - '.github/renovate.json5'

      - name: Validate Renovate config
        if: steps.changed-files.outputs.renovate == 'true'
        env:
          LOG_LEVEL: warn
        run: npx --yes --package renovate@43.278.4 -- renovate-config-validator

      - name: No Renovate config files changed
        if: steps.changed-files.outputs.renovate != 'true'
        run: echo "No Renovate config files were changed in this PR. Skipping validation."
