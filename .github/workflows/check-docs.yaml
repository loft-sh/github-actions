name: Check docs

on:
  push:
    branches: [main]
    paths:
      - '.github/actions/**/action.yml'
      - '.github/workflows/*.yaml'
      - 'docs/workflows/*.md'
  pull_request:
    paths:
      - '.github/actions/**/action.yml'
      - '.github/actions/**/README.md'
      - '.github/workflows/*.yaml'
      - 'docs/workflows/*.md'

jobs:
  check-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false
      - run: make check-docs
