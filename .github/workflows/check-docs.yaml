name: Check docs

on:
  push:
    branches: [main]
    paths:
      - '.github/actions/**/action.yml'
      - '.github/workflows/*.yaml'
      - 'docs/workflows/*.md'
  pull_request:
    paths:
      - '.github/actions/**/action.yml'
      - '.github/actions/**/README.md'
      - '.github/workflows/*.yaml'
      - 'docs/workflows/*.md'

jobs:
  check-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - run: make check-docs
