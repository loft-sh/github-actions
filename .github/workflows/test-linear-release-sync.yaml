name: Test linear-release-sync

on:
  push:
    branches: [main]
    paths:
      - '.github/actions/linear-release-sync/**'
  pull_request:
    paths:
      - '.github/actions/linear-release-sync/**'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: .github/actions/linear-release-sync/src/go.mod
      - name: Run tests
        run: go test ./...
        working-directory: .github/actions/linear-release-sync/src
      - name: Verify binary builds
        working-directory: .github/actions/linear-release-sync/src
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o /dev/null .
