name: Test linear-release-sync

on:
  push:
    branches: [main]
    paths:
      - '.github/actions/linear-release-sync/**'
  pull_request:
    paths:
      - '.github/actions/linear-release-sync/**'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: .github/actions/linear-release-sync/src/go.mod
      - name: Run tests
        run: go test ./...
        working-directory: .github/actions/linear-release-sync/src
      - name: Verify binary builds
        working-directory: .github/actions/linear-release-sync/src
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o /dev/null .
