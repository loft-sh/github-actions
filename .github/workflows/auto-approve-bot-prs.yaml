name: Auto-approve bot PRs

on:
  workflow_call:
    inputs:
      trusted-authors:
        description: 'Comma-separated list of trusted bot logins'
        type: string
        default: 'renovate[bot],loft-bot,github-actions[bot]'
      merge-method:
        description: 'Merge method for auto-merge (squash, merge, rebase)'
        type: string
        default: 'squash'
      auto-merge:
        description: 'Enable auto-merge after approval'
        type: boolean
        default: true
      app-id:
        description: 'GitHub App ID for minting installation tokens (preferred over PAT)'
        type: string
        default: ''
    secrets:
      gh-access-token:
        description: 'GitHub PAT for approving PRs (legacy — use app-id + app-private-key instead)'
        required: false
      app-private-key:
        description: 'GitHub App private key (PEM) for minting installation tokens'
        required: false

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    # Skip fork PRs — secrets are not available.
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      pull-requests: write
      contents: read
    # Safety net — internal steps already guard every failure mode, but if
    # anything unforeseen slips through this still prevents the job from
    # reporting a hard red check on caller CI.
    continue-on-error: true
    steps:
      - name: Mint GitHub App token
        id: app-token
        if: inputs.app-id != ''
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ inputs.app-id }}
          private-key: ${{ secrets.app-private-key }} # zizmor: ignore[secrets-outside-env] -- PEM key passed via workflow_call, not a repo secret
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: loft-sh/github-actions
          ref: main
          persist-credentials: false
          sparse-checkout: .github/actions/auto-approve-bot-prs
      - uses: ./.github/actions/auto-approve-bot-prs
        with:
          trusted-authors: ${{ inputs.trusted-authors }}
          merge-method: ${{ inputs.merge-method }}
          auto-merge: ${{ inputs.auto-merge }}
          github-token: ${{ steps.app-token.outputs.token || secrets.gh-access-token }} # zizmor: ignore[secrets-outside-env]
