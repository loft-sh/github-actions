name: Auto-approve bot PRs

on:
  workflow_call:
    inputs:
      trusted-authors:
        description: 'Comma-separated list of trusted bot logins'
        type: string
        default: 'renovate[bot],loft-bot,github-actions[bot]'
      merge-method:
        description: 'Merge method for auto-merge (squash, merge, rebase)'
        type: string
        default: 'squash'
      auto-merge:
        description: 'Enable auto-merge after approval'
        type: boolean
        default: true
      app-id:
        description: 'GitHub App ID for minting installation tokens (preferred over PAT)'
        type: string
        default: ''
      ai-risk-review:
        description: |
          Opt in to an AI risk review that runs concurrently with auto-approve.
          Posts a sticky PR review with a risk verdict (major version bumps,
          breaking API changes, removed exports, changed defaults). Advisory
          only — does not gate approval or auto-merge. Requires
          anthropic-api-key secret.
        type: boolean
        default: false
    secrets:
      gh-access-token:
        description: 'GitHub PAT for approving PRs (legacy — use app-id + app-private-key instead)'
        required: false
      app-private-key:
        description: 'GitHub App private key (PEM) for minting installation tokens'
        required: false
      anthropic-api-key:
        description: 'Anthropic API key for the AI risk review job (required when ai-risk-review is true)'
        required: false

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    # Skip fork PRs — secrets are not available.
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      pull-requests: write
      contents: read
    # Safety net — internal steps already guard every failure mode, but if
    # anything unforeseen slips through this still prevents the job from
    # reporting a hard red check on caller CI.
    continue-on-error: true
    steps:
      - name: Mint GitHub App token
        id: app-token
        if: inputs.app-id != ''
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ inputs.app-id }}
          private-key: ${{ secrets.app-private-key }} # zizmor: ignore[secrets-outside-env] -- PEM key passed via workflow_call, not a repo secret
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: loft-sh/github-actions
          ref: main
          persist-credentials: false
          sparse-checkout: .github/actions/auto-approve-bot-prs
      - uses: ./.github/actions/auto-approve-bot-prs
        with:
          trusted-authors: ${{ inputs.trusted-authors }}
          merge-method: ${{ inputs.merge-method }}
          auto-merge: ${{ inputs.auto-merge }}
          github-token: ${{ steps.app-token.outputs.token || secrets.gh-access-token }} # zizmor: ignore[secrets-outside-env]

  # Advisory AI risk review. Runs concurrently with auto-approve so the review
  # arrives alongside the approval, not after auto-merge ships. Never blocks
  # the auto-approve path — advisory only.
  ai-risk-review:
    if: inputs.ai-risk-review && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Restore CLAUDE.md from base branch
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          # Prevent prompt injection via CLAUDE.md in the PR head.
          git show "origin/${BASE_REF}:CLAUDE.md" > CLAUDE.md 2>/dev/null || rm -f CLAUDE.md

      - name: Claude risk review
        uses: anthropics/claude-code-action@5fb899572b81d2bb648d4d187173a2f423a9677c # v1
        with:
          anthropic_api_key: ${{ secrets.anthropic-api-key }} # zizmor: ignore[secrets-outside-env] -- API key passed via workflow_call, not a repo secret
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_bots: "renovate,dependabot,loft-bot,github-actions"
          track_progress: true
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }} for
            risk the auto-approve bot's CI gate cannot catch. This PR is about to be
            auto-merged — your review is the last human-readable signal.

            Look for:
            - major version bumps where the diff is more than a version number
            - removed or renamed public exports, breaking API changes
            - changed defaults in configs, schemas, or behaviour
            - security-sensitive paths (auth, tokens, network, permissions)
            - migrations or data-loss risk in backport PRs

            Skip: style, whitespace, naming, minor refactors, praise.

            Post ONE review comment summarising the risk (low | medium | high) and
            the reason. Use inline comments only for concrete, actionable issues.
            Advisory only — you do not block the merge.

          claude_args: |
            --mcp-config '{"mcpServers":{"context7":{"command":"npx","args":["-y","@upstash/context7-mcp"]},"sequential-thinking":{"command":"npx","args":["-y","@modelcontextprotocol/server-sequential-thinking"]}}}'
            --allowedTools "Read,Glob,Grep,LS,Bash(git diff:*),Bash(git log:*),Bash(gh pr view:*),Bash(gh pr diff:*),mcp__github_inline_comment__create_inline_comment,mcp__context7__*,mcp__sequential-thinking__*"
