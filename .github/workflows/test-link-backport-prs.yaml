name: Test link-backport-prs

on:
  push:
    branches: [main]
    paths:
      - '.github/actions/link-backport-prs/**'
  pull_request:
    paths:
      - '.github/actions/link-backport-prs/**'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: .github/actions/link-backport-prs/src/go.mod
      - run: go test ./...
        working-directory: .github/actions/link-backport-prs/src
