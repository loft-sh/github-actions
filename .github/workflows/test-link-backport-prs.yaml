name: Test link-backport-prs

on:
  push:
    branches: [main]
    paths:
      - '.github/actions/link-backport-prs/**'
  pull_request:
    paths:
      - '.github/actions/link-backport-prs/**'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: .github/actions/link-backport-prs/src/go.mod
      - run: go test ./...
        working-directory: .github/actions/link-backport-prs/src
