name: Test link-backport-prs

on:
  push:
    branches: [main]
    paths:
      - '.github/actions/link-backport-prs/**'
  pull_request:
    paths:
      - '.github/actions/link-backport-prs/**'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: .github/actions/link-backport-prs/src/go.mod
      - run: go test ./...
        working-directory: .github/actions/link-backport-prs/src
