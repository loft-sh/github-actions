name: Workflow Linting

on:
  workflow_call:
    inputs:
      reporter:
        description: 'reviewdog reporter type (github-pr-review or github-pr-check)'
        type: string
        required: false
        default: 'github-pr-review'

jobs:
  actionlint:
    # Skip if the PR comes from a fork (no write access to post reviews)
    if: github.event.pull_request.head.repo.full_name == github.repository
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout # zizmor: ignore[artipacked] -- reviewdog needs git credentials for local diff fallback on large PRs
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          fetch-depth: 0

      - name: Get changed workflow files
        id: changed-files
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            workflows:
              - '.github/workflows/**/*.yml'
              - '.github/workflows/**/*.yaml'

      - name: Run actionlint with reviewdog
        if: steps.changed-files.outputs.workflows == 'true'
        uses: reviewdog/action-actionlint@50842263c20a7c46bd0065b9e624d3c569db061e # v1.73.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: ${{ inputs.reporter }}
          filter_mode: file
          fail_level: error

      - name: No workflow files changed
        if: steps.changed-files.outputs.workflows != 'true'
        run: echo "No workflow files were changed in this PR. Skipping actionlint."
