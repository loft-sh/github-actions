name: Detect Changes

on:
  workflow_call:
    inputs:
      paths:
        required: true
        type: string
        description: "Glob pattern(s) to check for changes (comma-separated or YAML list)"
    outputs:
      has_changed:
        description: "Whether the specified directories/files have changed"
        value: ${{ jobs.changes.outputs.has_changed }}

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    outputs:
      has_changed: ${{ steps.set-output.outputs.has_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: true # paths-filter needs credentials to fetch the base commit on push events

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706  # v4.0.2
        with:
          base: ${{ github.event_name == 'push' && github.event.before || '' }}
          filters: |
            has_changed:
            ${{ inputs.paths }}

      - name: Set output
        id: set-output
        run: echo "has_changed=$HAS_CHANGED" >> "$GITHUB_OUTPUT"
        env:
          HAS_CHANGED: ${{ steps.filter.outputs.has_changed }}
