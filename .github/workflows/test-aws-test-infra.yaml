name: Test aws-test-infra

on:
  push:
    branches: [main]
    paths:
      - '.github/actions/aws-test-infra/**'
  pull_request:
    paths:
      - '.github/actions/aws-test-infra/**'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: .github/actions/aws-test-infra/src/go.mod
      - name: Run tests
        run: go test -v -race -count=1 ./...
        working-directory: .github/actions/aws-test-infra/src
      - name: Verify binary builds
        working-directory: .github/actions/aws-test-infra/src
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o /dev/null .

  bats:
    name: Run bats tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43 # 4.0.0
        with:
          tests: .github/actions/aws-test-infra/test
