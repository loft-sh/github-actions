name: Test aws-test-infra

on:
  push:
    branches: [main]
    paths:
      - '.github/actions/aws-test-infra/**'
  pull_request:
    paths:
      - '.github/actions/aws-test-infra/**'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: .github/actions/aws-test-infra/src/go.mod
      - name: Run tests
        run: go test ./...
        working-directory: .github/actions/aws-test-infra/src
      - name: Verify binary builds
        working-directory: .github/actions/aws-test-infra/src
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o /dev/null .
