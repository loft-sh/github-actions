name: AI PR review
description: |
  Runs an AI-powered PR review with a caller-provided prompt. The caller
  picks provider, effort, and the review instructions; the action owns
  model selection, comment shape, MCP servers, and write-tool access.
  The LLM decides whether findings are best expressed as inline comments,
  a sticky summary, or both. Advisory only — every failure mode degrades
  to a notice-level skip. The caller decides which PRs to review via
  workflow triggers and job-level `if:` conditions.
inputs:
  provider:
    description: 'AI provider: `anthropic` or `openai`.'
    required: true
  effort:
    description: 'Effort level (low | medium | high) — maps to a provider-specific model.'
    required: false
    default: 'medium'
  prompt:
    description: 'Review instructions passed verbatim as the AI prompt.'
    required: true
  anthropic-api-key:
    description: 'Anthropic API key. Required when provider=anthropic.'
    required: false
  openai-api-key:
    description: 'OpenAI API key. Required when provider=openai.'
    required: false
  github-token:
    description: 'Token used by claude-code-action to post comments and read PR state.'
    required: true

outputs:
  conclusion:
    description: '`success` when the AI review ran; `skipped` when the resolver vetoed the run (invalid input).'
    value: ${{ steps.conclusion.outputs.conclusion }}
  reason:
    description: 'One-line explanation when conclusion=skipped.'
    value: ${{ steps.cfg.outputs.reason }}

runs:
  using: composite
  steps:
    - name: Resolve config
      id: cfg
      shell: bash
      env:
        INPUT_PROVIDER: ${{ inputs.provider }}
        INPUT_EFFORT: ${{ inputs.effort }}
      run: ${{ github.action_path }}/src/resolve-config.sh

    # The anthropic branch needs the PR tree at the workspace ROOT because
    # claude-code-action has no working-directory input — Read/Glob/Grep and
    # the git CLI invoked by the Claude session all resolve paths against
    # $GITHUB_WORKSPACE. But the reusable workflow wrapper sparse-checked-out
    # this composite action's own src/ and action.yml into the same root, and
    # `actions/checkout` wipes untracked files (`git clean -ffdx`) during
    # checkout of the PR head — deleting the scripts we're about to invoke
    # and the action.yml the Post step needs. Stash the composite dir to
    # $RUNNER_TEMP before checkout and restore it afterward. `path: _pr`
    # (the openai-branch fix) isn't viable here because claude-code-action
    # has no equivalent `working-directory` input.
    - name: Stash composite action files before PR checkout
      if: steps.cfg.outputs.proceed == 'true' && inputs.provider == 'anthropic'
      shell: bash
      run: |
        stash_dir="$RUNNER_TEMP/ai-pr-review-stash"
        rm -rf "$stash_dir"
        mkdir -p "$stash_dir"
        cp -R .github/actions/ai-pr-review/. "$stash_dir/"

    # fetch-depth: 0 so restore-claude-md.sh can resolve origin/$BASE_REF.
    # Previously fetch-depth was 1, which silently no-oped the restore
    # (script 2>/dev/null || rm -f CLAUDE.md) on every run.
    - name: Checkout PR head
      if: steps.cfg.outputs.proceed == 'true' && inputs.provider == 'anthropic'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: 0
        persist-credentials: false

    - name: Restore composite action files after PR checkout
      if: steps.cfg.outputs.proceed == 'true' && inputs.provider == 'anthropic'
      shell: bash
      run: |
        stash_dir="$RUNNER_TEMP/ai-pr-review-stash"
        mkdir -p .github/actions/ai-pr-review
        cp -R "$stash_dir/." .github/actions/ai-pr-review/

    - name: Restore CLAUDE.md from base branch
      if: steps.cfg.outputs.proceed == 'true' && inputs.provider == 'anthropic'
      shell: bash
      env:
        BASE_REF: ${{ github.event.pull_request.base.ref }}
      run: ${{ github.action_path }}/src/restore-claude-md.sh

    - name: Claude PR review
      if: steps.cfg.outputs.proceed == 'true' && inputs.provider == 'anthropic'
      uses: anthropics/claude-code-action@567fe954a4527e81f132d87d1bdbcc94f7737434 # v1.0.107
      with:
        anthropic_api_key: ${{ inputs.anthropic-api-key }} # zizmor: ignore[secrets-outside-env] -- API key passed via composite input, not a repo secret
        github_token: ${{ inputs.github-token }}
        allowed_bots: '*'
        track_progress: true
        use_sticky_comment: true
        prompt: |
          ${{ inputs.prompt }}

          Comment shape is your choice. Post inline comments on specific
          lines for localized findings; post a summary PR comment for
          repo-wide or cross-cutting findings; use both when useful. Do
          not post a summary comment that only restates findings already
          posted inline — prefer a short synthesis or skip it.

          Provenance: the very last line of every comment you post MUST
          be this line verbatim (keep the leading `> ` and underscores so
          it renders as an italic blockquote):
          > _🤖 ai-pr-review — provider: anthropic · model: ${{ steps.cfg.outputs.model }} · effort: ${{ inputs.effort }}_
        claude_args: |
          --model ${{ steps.cfg.outputs.model }}
          --mcp-config '{"mcpServers":{"context7":{"command":"npx","args":["-y","@upstash/context7-mcp"]},"sequential-thinking":{"command":"npx","args":["-y","@modelcontextprotocol/server-sequential-thinking"]}}}'
          --allowedTools "Read,Glob,Grep,LS,Bash(git diff:*),Bash(git log:*),Bash(gh pr view:*),Bash(gh pr diff:*),mcp__context7__*,mcp__sequential-thinking__*,mcp__github_inline_comment__create_inline_comment"

    # --- openai branch ----------------------------------------------------
    # head.sha is used (not refs/pull/N/merge) because merge refs are absent on
    # conflicted PRs — hard-failure would violate the never-hard-fail contract.
    # fetch-depth: 0 pulls the base branch during the authenticated checkout
    # itself (for `git diff base...head`), so no follow-up fetch is needed and
    # persist-credentials: false is safe (zizmor: avoid artipacked).
    # path: _pr checks out into a subdirectory — the reusable workflow wrapper
    # sparse-checked-out this composite's own action.yml into the workspace
    # root, and clobbering it breaks GitHub's late-stage action resolution.
    - name: Checkout PR head (openai)
      if: steps.cfg.outputs.proceed == 'true' && inputs.provider == 'openai'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: 0
        persist-credentials: false
        path: _pr

    # codex-action has no inline-comment surface, so the openai path is
    # always summary-comment-only. Documented as an honest provider
    # asymmetry in the README rather than hidden behind an input.
    - name: Codex PR review
      id: codex
      if: steps.cfg.outputs.proceed == 'true' && inputs.provider == 'openai'
      uses: openai/codex-action@5c3f4ccdb2b8790f73d6b21751ac00e602aa0c02 # v1.7
      with:
        openai-api-key: ${{ inputs.openai-api-key }} # zizmor: ignore[secrets-outside-env] -- API key passed via composite input, not a repo secret
        model: ${{ steps.cfg.outputs.model }}
        effort: ${{ inputs.effort }}
        sandbox: read-only
        safety-strategy: drop-sudo
        allow-bots: 'true'
        working-directory: _pr
        prompt: |
          ${{ inputs.prompt }}

          Report all findings as a single PR comment (codex-action has no
          inline-comment surface).

    - name: Post Codex feedback as PR comment
      if: steps.cfg.outputs.proceed == 'true' && inputs.provider == 'openai' && steps.codex.outputs.final-message != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        BODY: ${{ steps.codex.outputs.final-message }}
        MODEL: ${{ steps.cfg.outputs.model }}
        EFFORT: ${{ inputs.effort }}
      run: |
        # Provenance footer is emitted deterministically here (unlike the
        # anthropic path which relies on prompt compliance) so every
        # openai PR comment carries attribution even if the model's body
        # text doesn't.
        {
          printf '%s\n\n' "$BODY"
          printf '> _🤖 ai-pr-review — provider: openai · model: %s · effort: %s_\n' "$MODEL" "$EFFORT"
        } | gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file -

    - name: Emit conclusion
      id: conclusion
      if: always()
      shell: bash
      env:
        PROCEED: ${{ steps.cfg.outputs.proceed }}
      run: |
        if [ "$PROCEED" = "true" ]; then
          echo "conclusion=success" >> "$GITHUB_OUTPUT"
        else
          echo "conclusion=skipped" >> "$GITHUB_OUTPUT"
        fi
