name: 'Slack Release Notification'
description: 'Sends a notification to Slack when a new release is published'
branding:
  icon: "bell"
  color: "orange"
inputs:
  version:
    description: 'Release version'
    required: true
  previous_tag:
    description: 'Previous release tag for changelog comparison'
    required: false
    default: ''
  changes:
    description: 'Release changes'
    required: false
    default: 'See changelog link below'
  is_draft:
    description: 'Is this a draft release?'
    required: false
    default: 'false'
  is_prerelease:
    description: 'Is this a pre-release?'
    required: false
    default: 'false'
  target_repo:
    description: 'Target repository'
    required: true
  product:
    description: 'Product name (vCluster or vCluster Platform)'
    required: true
  base_branch:
    description: 'Source branch from which the release was cut (auto-detected from git history when omitted)'
    required: false
    default: ''
  webhook_url:
    description: 'Slack Webhook URL'
    required: true

runs:
  using: "composite"
  steps:
    - name: Detect base branch
      id: detect_branch
      if: inputs.base_branch == ''
      shell: bash
      env:
        RELEASE_VERSION: ${{ inputs.version }}
      run: |
        BRANCH=$("${{ github.action_path }}/detect-branch.sh")
        echo "base_branch=$BRANCH" >> "$GITHUB_OUTPUT"
    - name: Post release notification
      uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95  # v3.0.1
      with:
        errors: true
        webhook-type: incoming-webhook
        webhook: ${{ inputs.webhook_url }}
        payload: |
          text: "New ${{ inputs.product }} Release: ${{ inputs.version }}"
          blocks:
            - type: header
              text:
                type: plain_text
                text: "New ${{ inputs.product }} Release"
                emoji: false
            - type: section
              fields:
                - type: mrkdwn
                  text: "*Version:*\n${{ inputs.version }}"
            - type: section
              fields:
                - type: mrkdwn
                  text: "*Repository:*\n${{ inputs.target_repo }}"
                - type: mrkdwn
                  text: "*Released by:*\n${{ github.actor }}"
            - type: section
              fields:
                - type: mrkdwn
                  text: "*Source Branch:*\n${{ inputs.base_branch || steps.detect_branch.outputs.base_branch || 'main' }}"
            - type: section
              text:
                type: mrkdwn
                text: "*Changes:*\n<https://github.com/${{ inputs.target_repo }}/compare/${{ inputs.previous_tag }}...${{ inputs.version }}|View Full Changelog>"
            - type: context
              elements:
                - type: mrkdwn
                  text: "<https://github.com/${{ inputs.target_repo }}/releases/tag/${{ inputs.version }}|View Release>"
