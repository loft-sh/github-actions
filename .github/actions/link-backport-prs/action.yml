name: 'Link Backport PRs to Linear'
description: 'Links sorenlouv-created backport PRs to the matching Linear sub-issue by adding "Fixes <id>" to the backport PR body, and verifies the sub-issue carries a release on the backport target line'

inputs:
  source-pr:
    description: 'The merged source pull request number that was backported'
    required: true
  repo-owner:
    description: 'The owner of the repository'
    required: true
  repo-name:
    description: 'The name of the repository'
    required: true
  github-token:
    description: 'GitHub token with permission to read and edit pull requests (must be the same PAT that created the backport PRs)'
    required: true
  linear-token:
    description: 'Linear API token for resolving the issue family and verifying release attachments. Optional: the step always exits 0, so callers can adopt the backport workflow before a token is wired up. When it is empty but the source PR carries backport labels, the step emits a warning naming the missing secret instead of silently doing nothing.'
    required: false
    default: ''
  label-prefix:
    description: 'Prefix of the backport labels on the source PR'
    required: false
    default: 'backport-to-'
  dry-run:
    description: 'Log intended edits without applying them'
    required: false
    default: 'false'

outputs:
  linked-count:
    description: 'Number of backport PRs linked to a Linear sub-issue (0 when the step skips)'
    value: ${{ steps.link.outputs.linked-count }}

runs:
  using: 'composite'
  steps:
    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: ${{ github.action_path }}/src/go.mod

    - name: Build and run Link Backport PRs
      id: link
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        LINEAR_TOKEN: ${{ inputs.linear-token }}
        ACTION_PATH: ${{ github.action_path }}
        INPUT_SOURCE_PR: ${{ inputs.source-pr }}
        INPUT_REPO_OWNER: ${{ inputs.repo-owner }}
        INPUT_REPO_NAME: ${{ inputs.repo-name }}
        INPUT_LABEL_PREFIX: ${{ inputs.label-prefix }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
      run: |
        cd "$ACTION_PATH/src"
        go build -o link-backport-prs .
        ./link-backport-prs \
          -source-pr="$INPUT_SOURCE_PR" \
          -repo-owner="$INPUT_REPO_OWNER" \
          -repo-name="$INPUT_REPO_NAME" \
          -label-prefix="$INPUT_LABEL_PREFIX" \
          -dry-run="$INPUT_DRY_RUN"

branding:
  icon: 'link'
  color: 'orange'
